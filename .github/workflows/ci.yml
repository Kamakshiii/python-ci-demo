name: ci pipeline
on:
    push:
      branches:
        - main
jobs:
   test:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v3
        with:
          python-version: "3.10"

      - name: install python dependencies
        run: pip install -r requirements.txt

      - name: run test
        run: pytest

      - name: docker build
        run: docker build -t my-app.
