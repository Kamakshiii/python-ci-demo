apiVersion: apps/v1
kind: Deployment

metadata:
  name: flask-app
  namespace: flask-devops

spec:
  replicas: 2

  selector:
    matchLabels:
      app: flask-app

  template:
    metadata:
      labels:
        app: flask-app

    spec:
      containers:
        - name: flask-app

          image: kamakshii/flask-devops-app:latest

          ports:
            - containerPort: 5000
